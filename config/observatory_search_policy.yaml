search:
  runtime_root: data/analysis/observatory_runtime
  session_root: data/analysis/experiments/search_runs
  mirror_repo: data/analysis/observatory_runtime/repos/cohort_projections.git
  worktree_root: data/analysis/observatory_runtime/worktrees
  recipe_catalog: config/observatory_recipes.yaml
  search_pack_root: config/observatory_search_packs

  compile_changed_python: true
  keep_worktrees: false
  default_run_budget: 3

  protected_paths:
    - config/method_profiles/aliases.yaml
    - DEVELOPMENT_TRACKER.md
    - docs/governance/adrs

  allowed_recipe_roots:
    - cohort_projections
    - scripts/analysis
    - config/method_profiles

  # Dirty files under these roots can affect benchmark behavior and block a
  # deep-search run. Dirty files outside these roots are logged as warnings
  # but no longer block unrelated planning or marketing work.
  dirty_blocking_roots:
    - cohort_projections
    - scripts/analysis
    - scripts/data
    - scripts/projections
    - config
    - data/backtesting
    - data/interim
    - data/processed
    - data/projections
    - pyproject.toml
    - uv.lock
    - .python-version
    - pytest.ini
    - mypy.ini
    - ruff.toml
    - setup.cfg
    - tox.ini

  planner:
    max_pending: 3
    max_recommended: 5
    include_recipe_catalog: true

  deep_search:
    time_budget_hours: 6.0
    total_candidate_cap: 48
    plateau_rounds: 2
    min_improvement_pp: 0.02
    operational_repeat_limit: 3
    operational_failure_window: 10
    operational_failure_rate: 0.20
    max_patch_files: 5
    max_patch_lines: 300
