    enabled: true
    execution_mode: code_recipe
    candidate_id: recipe-search-recent-window-2
    experiment_id: exp-{date}-recipe-search-recent-window-2
    hypothesis: >
      Clone the current challenger into a search-only method with a wider
      recent-period migration window so the sandbox can test whether a less
      reactive short-term convergence signal improves benchmark accuracy.
    base_method: m2026r1
    base_config: cfg-20260309-college-fix-v1
