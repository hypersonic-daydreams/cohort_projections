      mortality_improvement_rate: 0.003
    scope: county
    benchmark_label: recipe-search-mortality-003
    method_id_override: m2026r1_search_mortality_003
    notes:
      - Search-only benchmark method. Uses a unique method ID and never touches production aliases.
