recipes:
  RX-101:
    enabled: true
    execution_mode: code_recipe
    candidate_id: recipe-search-recent-window-2-medium-2
    experiment_id: exp-{date}-recipe-search-recent-window-2-medium-2
    hypothesis: >
      Clone the current challenger into a search-only method that widens the
      short-term convergence window to two observed periods while holding the
      medium window at two periods, isolating whether a less reactive recent
      signal improves benchmark accuracy without making the medium trend more
      conservative.
    base_method: m2026r1
    base_config: cfg-20260309-college-fix-v1
    config_delta:
      convergence_recent_period_count: 2
      convergence_medium_period_count: 2
    scope: county
    benchmark_label: recipe-search-recent-window-2-medium-2
    method_id_override: m2026r1_search_recent2_medium2
    notes:
      - Search-only benchmark method. Uses a unique method ID and never touches production aliases.
      - Designed to isolate recent-window widening from broader medium-window changes.
    steps: []

