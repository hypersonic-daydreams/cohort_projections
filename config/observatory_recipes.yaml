      convergence_recent_period_count: 2
      convergence_medium_period_count: 3
    scope: county
    benchmark_label: recipe-search-recent-window-2
    method_id_override: m2026r1_search_recent_window_2
    notes:
      - Search-only benchmark method. Uses a unique method ID and never touches production aliases.
      - The benchmark runtime clones dispatch behavior from the base method profile.
