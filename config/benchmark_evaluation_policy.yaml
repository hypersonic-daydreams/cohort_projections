# Benchmark Evaluation Policy
# Machine-readable gates and thresholds for automated experiment evaluation.
# Referenced by: cohort_projections/analysis/evaluation_policy.py
# See: docs/plans/benchmarking-process-improvement-roadmap.md (P1/P2)

policy_version: "1.0"

hard_gates:
  # Zero tolerance — any violation fails the experiment immediately
  negative_population_violations:
    max_allowed: 0
    description: "No county-year may project negative population"
  scenario_order_violations:
    max_allowed: 0
    description: "Baseline must always be between restricted and high growth"
  aggregation_violations:
    max_allowed: 0
    description: "County sums must match state totals within rounding tolerance (2.0 persons; see ADR-062)"

tradeoff_thresholds:
  # Maximum regression allowed relative to champion (positive = worse)
  # If exceeded, result is needs_human_review
  county_mape_rural:
    max_regression: 0.10
    description: "Rural county MAPE regression limit (percentage points)"
  county_mape_bakken:
    max_regression: 0.50
    description: "Bakken county MAPE regression limit (percentage points)"
  county_mape_overall:
    max_regression: 0.05
    description: "Overall county MAPE regression limit (percentage points)"
  county_mape_reservation:
    max_regression: 0.25
    description: "Reservation county regression limit (percentage points)"
  county_mape_volatile_oil:
    max_regression: 0.35
    description: "Highly volatile oil county regression limit (percentage points)"
  county_mape_smallest:
    max_regression: 0.20
    description: "Smallest-county regression limit (percentage points)"
  county_mape_college_heavy_non_core:
    max_regression: 0.15
    description: "College-heavy non-core county regression limit (percentage points)"

tradeoff_metrics:
  # Alias retained for clearer semantics in downstream tooling.
  county_mape_rural:
    max_regression: 0.10
  county_mape_bakken:
    max_regression: 0.50
  county_mape_overall:
    max_regression: 0.05
  county_mape_reservation:
    max_regression: 0.25
  county_mape_volatile_oil:
    max_regression: 0.35
  county_mape_smallest:
    max_regression: 0.20
  county_mape_college_heavy_non_core:
    max_regression: 0.15

promotion_policy:
  state_ape_recent_short_min_improvement: 0.10
  state_ape_recent_medium_min_improvement: 0.25
  county_mape_overall_max_regression: 0.00
  require_zero_hard_constraint_regression: true
  sentinel_vetoes:
    sentinel_cass_mape: 0.10
    sentinel_grand_forks_mape: 0.10
    sentinel_ward_mape: 0.10
    sentinel_burleigh_mape: 0.10

agent_classification_rules:
  passed_all_gates:
    description: "All hard gates passed AND no tradeoff regression beyond threshold"
    conditions:
      - "all hard gates: challenger value <= max_allowed"
      - "all tradeoffs: challenger delta <= max_regression"
      - "sensitivity_instability_flag is false"
  needs_human_review:
    description: "Hard gates pass but tradeoff thresholds are breached, or mixed signals"
    conditions:
      - "all hard gates pass"
      - "at least one tradeoff threshold exceeded OR sensitivity_instability_flag is true"
  failed_hard_gate:
    description: "At least one hard gate is violated"
    conditions:
      - "any hard gate: challenger value > max_allowed"
  inconclusive:
    description: "Unable to evaluate — missing data, benchmark failure, or code-change required"
    conditions:
      - "scorecard is incomplete or benchmark did not run to completion"
      - "experiment requires METHOD_DISPATCH code changes (not config-only)"
