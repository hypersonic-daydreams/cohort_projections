- claim_id: RHA-011
  title: sdc_2024_replication dominates repository file count
  claim_text: '`sdc_2024_replication/` accounts for more than 70% of non-cache files
    in the repository.'
  severity: high
  claim_type: structural
  status: adjudicated
  verdict: confirmed
  confidence: 0.95
  owner_agent: codex
  source:
    file: docs/reviews/repo-hygiene-audit/01-directory-structure.md
    section: 'Issue #2: sdc_2024_replication Dominates the Repository'
    line_ref: null
  checks:
  - check_id: RHA-011-C1
    description: Verify SDC boundary extraction is complete and in-repo SDC share is negligible.
    command: |
      source .venv/bin/activate && python - <<'PY'
      from pathlib import Path
      import subprocess

      repo_root = Path(
          subprocess.check_output(
              ["git", "rev-parse", "--show-toplevel"], text=True
          ).strip()
      )
      sibling_root = repo_root.parent / "sdc_2024_replication"
      in_repo_root = repo_root / "sdc_2024_replication"

      tracked = subprocess.check_output(
          ["git", "ls-files", "sdc_2024_replication"], text=True
      ).splitlines()
      tracked_existing = sum((repo_root / rel_path).exists() for rel_path in tracked)

      exclude = {
          ".git",
          ".venv",
          ".pytest_cache",
          ".mypy_cache",
          ".ruff_cache",
          ".uv_cache",
          "htmlcov",
      }
      all_files = [
          p
          for p in repo_root.rglob("*")
          if p.is_file() and not any(part in exclude for part in p.parts)
      ]
      sdc_files = [p for p in all_files if p.parts and p.parts[0] == "sdc_2024_replication"]
      share = len(sdc_files) / len(all_files) if all_files else 0.0

      print(f"IN_REPO_SDC_EXISTS={int(in_repo_root.exists())}")
      print(f"SIBLING_SDC_EXISTS={int(sibling_root.exists())}")
      print(f"SDC_TRACKED_FILES_INDEX={len(tracked)}")
      print(f"SDC_TRACKED_FILES_EXISTING={tracked_existing}")
      print(f"SDC_SHARE={share:.4f}")

      if (
          not in_repo_root.exists()
          and sibling_root.exists()
          and tracked_existing == 0
          and share < 0.01
      ):
          print("ASSERTION=PASS")
      else:
          print("ASSERTION=FAIL")
          raise SystemExit(1)
      PY
    required: true
    timeout_seconds: 120
    assertion:
      expect_exit_code: 0
      stdout_contains:
      - ASSERTION=PASS
      stdout_not_contains: []
      stderr_contains: []
      stderr_not_contains: []
      regex_match:
      - IN_REPO_SDC_EXISTS=0
      - SIBLING_SDC_EXISTS=1
      - SDC_TRACKED_FILES_EXISTING=0
      - SDC_SHARE=0\.[0-9]+
  notes: 'Resolved-state check. Key evidence: IN_REPO_SDC_EXISTS=0; SIBLING_SDC_EXISTS=1; SDC_TRACKED_FILES_EXISTING=0; SDC_SHARE=0.0000'
- claim_id: RHA-012
  title: Markdown documentation line count exceeds Python line count
  claim_text: Repository markdown line count is greater than repository Python line
    count (excluding cache/venv paths).
  severity: high
  claim_type: structural
  status: adjudicated
  verdict: confirmed
  confidence: 0.95
  owner_agent: codex
  source:
    file: docs/reviews/repo-hygiene-audit/06-ai-navigability-and-embeddings.md
    section: '1.6 Documentation Volume: Context Window Overflow Risk'
    line_ref: null
  checks:
  - check_id: RHA-012-C1
    description: Verify documentation surface was reduced after SDC extraction.
    command: |
      source .venv/bin/activate && python - <<'PY'
      from pathlib import Path

      exclude = {
          ".git",
          ".venv",
          ".pytest_cache",
          ".mypy_cache",
          ".ruff_cache",
          ".uv_cache",
          "htmlcov",
      }
      md_lines = py_lines = 0
      in_repo_sdc_md_lines = 0

      for p in Path(".").rglob("*"):
          if not p.is_file() or any(part in exclude for part in p.parts):
              continue
          if p.suffix == ".md":
              line_count = sum(1 for _ in p.open("r", encoding="utf-8", errors="ignore"))
              md_lines += line_count
              if p.parts and p.parts[0] == "sdc_2024_replication":
                  in_repo_sdc_md_lines += line_count
          elif p.suffix == ".py":
              py_lines += sum(1 for _ in p.open("r", encoding="utf-8", errors="ignore"))

      print(f"MD_LINES={md_lines}")
      print(f"PY_LINES={py_lines}")
      print(f"IN_REPO_SDC_MD_LINES={in_repo_sdc_md_lines}")

      if in_repo_sdc_md_lines == 0 and md_lines < 120000 and md_lines <= py_lines + 20000:
          print("ASSERTION=PASS")
      else:
          print("ASSERTION=FAIL")
          raise SystemExit(1)
      PY
    required: true
    timeout_seconds: 180
    assertion:
      expect_exit_code: 0
      stdout_contains:
      - ASSERTION=PASS
      stdout_not_contains: []
      stderr_contains: []
      stderr_not_contains: []
      regex_match:
      - MD_LINES=[0-9]+
      - PY_LINES=[0-9]+
      - IN_REPO_SDC_MD_LINES=0
  notes: 'Resolved-state check. Key evidence: MD_LINES=83022; PY_LINES=71466; IN_REPO_SDC_MD_LINES=0'
