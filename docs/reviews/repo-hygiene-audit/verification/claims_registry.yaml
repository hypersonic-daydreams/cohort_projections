    description: Count Python lines in tests/test_statistical and tests/unit.
    command: "source .venv/bin/activate && python - <<'PY'\nfrom pathlib import Path\n\
      line_total = 0\nfile_total = 0\nfor d in [Path(\"tests/test_statistical\"),\
