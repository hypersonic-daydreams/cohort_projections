- claim_id: RHA-009
  title: ADR README index is stale for late-series ADRs
  claim_text: ADR README rows for ADR-047 through ADR-053 are marked `Proposed` despite
    non-Proposed file statuses, and ADR-054/055 are missing from the index.
  severity: critical
  claim_type: structural
  status: adjudicated
  verdict: confirmed
  confidence: 0.95
  owner_agent: codex
  source:
    file: docs/reviews/repo-hygiene-audit/03-documentation.md
    section: 2.3 ADR README Index is Stale
    line_ref: null
  checks:
  - check_id: RHA-009-C1
    description: Verify ADR README index is aligned and includes 054/055.
    command: "source .venv/bin/activate && python - <<'PY'\nfrom pathlib import Path\n\
      import re\nreadme = Path(\"docs/governance/adrs/README.md\").read_text(encoding=\"\
      utf-8\")\nids = [\"047\",\"048\",\"049\",\"050\",\"051\",\"052\",\"053\"]\n\
      mismatch = 0\nfor adr in ids:\n    line = next((ln for ln in readme.splitlines()\
      \ if f\"[{adr}]\" in ln), \"\")\n    if \"| Proposed |\" not in line:\n    \
      \    continue\n    f = next(Path(\"docs/governance/adrs\").glob(f\"{adr}-*.md\"\
      ))\n    text = f.read_text(encoding=\"utf-8\")\n    status_match = re.search(r\"\
      ^## Status\\n(.+)$\", text, flags=re.MULTILINE)\n    status = status_match.group(1).strip()\
      \ if status_match else \"<missing>\"\n    if not status.startswith(\"Proposed\"\
      ):\n        mismatch += 1\nmissing = [adr for adr in [\"054\", \"055\"] if f\"\
      [{adr}]\" not in readme]\nprint(f\"MISMATCH_COUNT={mismatch}\")\nprint(f\"MISSING_COUNT={len(missing)}\"\
      )\nprint(\"MISSING_IDS=\" + \",\".join(missing))\nif mismatch == 0 and len(missing)\
      \ == 0:\n    print(\"ASSERTION=PASS\")\nelse:\n    print(\"ASSERTION=FAIL\"\
      )\n    raise SystemExit(1)\nPY"
    required: true
    timeout_seconds: 120
    assertion:
      expect_exit_code: 0
      stdout_contains:
      - ASSERTION=PASS
      stdout_not_contains: []
      stderr_contains: []
      stderr_not_contains: []
      regex_match:
      - MISMATCH_COUNT=0
      - MISSING_COUNT=0
  notes: 'Resolved-state check. Key evidence: MISMATCH_COUNT=0; MISSING_COUNT=0'
