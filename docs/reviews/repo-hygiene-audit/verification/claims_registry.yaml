- claim_id: RHA-001
  title: Ghost projection runner is referenced but missing
  claim_text: The repository references `scripts/projections/run_all_projections.py`
    in active docs, but the file does not exist.
  severity: critical
  claim_type: structural
  status: adjudicated
  verdict: confirmed
  confidence: 0.95
  owner_agent: codex
  source:
    file: docs/reviews/repo-hygiene-audit/00-synthesis-summary.md
    section: The Ugly
    line_ref: null
  checks:
  - check_id: RHA-001-C1
    description: Verify canonical runner exists and remains referenced by project documentation.
    command: refs=$(rg -n "scripts/projections/run_all_projections.py" AGENTS.md CLAUDE.md
      README.md DEVELOPMENT_TRACKER.md docs/INDEX.md docs/reviews -g "*.md" | wc -l
      || true); exists=0; [ -f scripts/projections/run_all_projections.py ] && exists=1;
      echo "DOC_REF_COUNT=$refs"; echo "FILE_EXISTS=$exists"; if [ "$refs" -ge 1
      ] && [ "$exists" -eq 1 ]; then
      echo "ASSERTION=PASS"; else echo "ASSERTION=FAIL"; exit 1; fi
    required: true
    timeout_seconds: 30
    assertion:
      expect_exit_code: 0
      stdout_contains:
      - ASSERTION=PASS
      stdout_not_contains: []
      stderr_contains: []
      stderr_not_contains: []
