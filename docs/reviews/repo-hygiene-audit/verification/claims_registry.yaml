    description: Verify importlib dynamic import and target pipeline script reference.
    command: spec_count=$(rg -n "importlib.util.spec_from_file_location" scripts/projections/run_pep_projections.py
      | wc -l); target_count=$(rg -n "02_run_projections.py" scripts/projections/run_pep_projections.py
      | wc -l); echo "IMPORTLIB_SPEC_COUNT=$spec_count"; echo "PIPELINE_TARGET_REF_COUNT=$target_count";
      if [ "$spec_count" -ge 1 ] && [ "$target_count" -ge 1 ]; then echo "ASSERTION=PASS";
      else echo "ASSERTION=FAIL"; exit 1; fi
    required: true
    timeout_seconds: 30
    assertion:
      expect_exit_code: 0
      stdout_contains:
      - ASSERTION=PASS
      stdout_not_contains: []
      stderr_contains: []
      stderr_not_contains: []
      regex_match:
      - IMPORTLIB_SPEC_COUNT=[1-9]
  notes: 'Checks 1/1. Key evidence: IMPORTLIB_SPEC_COUNT=1; PIPELINE_TARGET_REF_COUNT=2'
- claim_id: RHA-009
  title: ADR README index is stale for late-series ADRs
  claim_text: ADR README rows for ADR-047 through ADR-053 are marked `Proposed` despite
    non-Proposed file statuses, and ADR-054/055 are missing from the index.
  severity: critical
  claim_type: structural
  status: adjudicated
  verdict: confirmed
  confidence: 0.95
  owner_agent: codex
  source:
    file: docs/reviews/repo-hygiene-audit/03-documentation.md
    section: 2.3 ADR README Index is Stale
    line_ref: null
  checks:
  - check_id: RHA-009-C1
    description: Compare README status rows against ADR file statuses for 047-053
      and check missing 054/055.
    command: "source .venv/bin/activate && python - <<'PY'\nfrom pathlib import Path\n\
      import re\nreadme = Path(\"docs/governance/adrs/README.md\").read_text(encoding=\"\
      utf-8\")\nids = [\"047\",\"048\",\"049\",\"050\",\"051\",\"052\",\"053\"]\n\
      mismatch = 0\nfor adr in ids:\n    line = next((ln for ln in readme.splitlines()\
      \ if f\"[{adr}]\" in ln), \"\")\n    if \"| Proposed |\" not in line:\n    \
      \    continue\n    f = next(Path(\"docs/governance/adrs\").glob(f\"{adr}-*.md\"\
      ))\n    text = f.read_text(encoding=\"utf-8\")\n    status_match = re.search(r\"\
      ^## Status\\n(.+)$\", text, flags=re.MULTILINE)\n    status = status_match.group(1).strip()\
      \ if status_match else \"<missing>\"\n    if not status.startswith(\"Proposed\"\
      ):\n        mismatch += 1\nmissing = [adr for adr in [\"054\", \"055\"] if f\"\
      [{adr}]\" not in readme]\nprint(f\"MISMATCH_COUNT={mismatch}\")\nprint(f\"MISSING_COUNT={len(missing)}\"\
      )\nprint(\"MISSING_IDS=\" + \",\".join(missing))\nif mismatch >= 7 and len(missing)\
      \ == 2:\n    print(\"ASSERTION=PASS\")\nelse:\n    print(\"ASSERTION=FAIL\"\
      )\n    raise SystemExit(1)\nPY"
    required: true
    timeout_seconds: 120
    assertion:
      expect_exit_code: 0
      stdout_contains:
      - ASSERTION=PASS
      stdout_not_contains: []
      stderr_contains: []
      stderr_not_contains: []
      regex_match:
      - MISMATCH_COUNT=[7-9]
      - MISSING_COUNT=2
  notes: 'Checks 1/1. Key evidence: MISMATCH_COUNT=7; MISSING_COUNT=2'
- claim_id: RHA-010
  title: Tests include substantial sibling-repo-focused suites
  claim_text: Tests under `tests/test_statistical/` and `tests/unit/` total more than
