- claim_id: RHA-005
  title: Version declarations are inconsistent across locations
  claim_text: Version declarations exist in four locations (`pyproject.toml`, `cohort_projections/version.py`,
    `cohort_projections/output/__init__.py`, `CLAUDE.md`) with at least three distinct
    values.
  severity: high
  claim_type: structural
  status: adjudicated
  verdict: confirmed
  confidence: 0.95
  owner_agent: codex
  source:
    file: docs/reviews/repo-hygiene-audit/00-synthesis-summary.md
    section: The Ugly
    line_ref: null
  checks:
  - check_id: RHA-005-C1
    description: Verify version authority is harmonized and package exports version symbol.
    command: pyv=$(rg -n '^version\s*=\s*"([0-9.]+)"' pyproject.toml | sed -E 's/.*"([0-9.]+)".*/\1/');
      pipev=$(rg -n '__version__\s*=\s*"([0-9.]+)"' scripts/pipeline/__init__.py |
      sed -E 's/.*"([0-9.]+)".*/\1/'); pkg_ref=$(rg -n 'from \.version import __version__'
      cohort_projections/__init__.py | wc -l); echo "PYPROJECT_VERSION=$pyv"; echo
      "PIPELINE_INIT_VERSION=$pipev"; echo "PACKAGE_VERSION_IMPORTS=$pkg_ref"; if
      [ "$pyv" = "$pipev" ] && [ "$pkg_ref" -ge 1 ]; then echo "ASSERTION=PASS";
      else echo "ASSERTION=FAIL"; exit 1; fi
    required: true
    timeout_seconds: 30
    assertion:
      expect_exit_code: 0
      stdout_contains:
      - ASSERTION=PASS
      stdout_not_contains: []
      stderr_contains: []
      stderr_not_contains: []
      regex_match:
      - PACKAGE_VERSION_IMPORTS=[1-9]
  notes: 'Resolved-state check. Key evidence: PYPROJECT_VERSION=0.1.0; PIPELINE_INIT_VERSION=0.1.0'
