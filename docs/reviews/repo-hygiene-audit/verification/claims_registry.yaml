    assertion:
      expect_exit_code: 0
      stdout_contains:
      - ASSERTION=PASS
      stdout_not_contains: []
      stderr_contains: []
      stderr_not_contains: []
      regex_match:
      - SIBLING_TEST_LINES=[0-9]+
  notes: 'Checks 1/1. Key evidence: SIBLING_TEST_FILES=15; SIBLING_TEST_LINES=4137'
- claim_id: RHA-011
  title: sdc_2024_replication dominates repository file count
  claim_text: '`sdc_2024_replication/` accounts for more than 70% of non-cache files
    in the repository.'
  severity: high
  claim_type: structural
  status: adjudicated
  verdict: confirmed
  confidence: 0.95
  owner_agent: codex
  source:
    file: docs/reviews/repo-hygiene-audit/01-directory-structure.md
    section: 'Issue #2: sdc_2024_replication Dominates the Repository'
    line_ref: null
  checks:
  - check_id: RHA-011-C1
    description: Compute non-cache file share belonging to sdc_2024_replication.
    command: "source .venv/bin/activate && python - <<'PY'\nfrom pathlib import Path\n\
      exclude = {\".git\", \".venv\", \".pytest_cache\", \".mypy_cache\", \".ruff_cache\"\
      , \".uv_cache\", \"htmlcov\"}\nall_files = [p for p in Path(\".\").rglob(\"\
      *\") if p.is_file() and not any(part in exclude for part in p.parts)]\nsdc_files\
      \ = [p for p in all_files if p.parts and p.parts[0] == \"sdc_2024_replication\"\
      ]\nshare = len(sdc_files) / len(all_files) if all_files else 0.0\nprint(f\"\
      TOTAL_FILES={len(all_files)}\")\nprint(f\"SDC_FILES={len(sdc_files)}\")\nprint(f\"\
      SDC_SHARE={share:.4f}\")\nif share > 0.70:\n    print(\"ASSERTION=PASS\")\n\
      else:\n    print(\"ASSERTION=FAIL\")\n    raise SystemExit(1)\nPY"
    required: true
    timeout_seconds: 120
    assertion:
      expect_exit_code: 0
      stdout_contains:
      - ASSERTION=PASS
      stdout_not_contains: []
      stderr_contains: []
      stderr_not_contains: []
      regex_match:
      - SDC_SHARE=0\.[0-9]+
  notes: 'Checks 1/1. Key evidence: TOTAL_FILES=10666; SDC_FILES=7842'
- claim_id: RHA-012
  title: Markdown documentation line count exceeds Python line count
  claim_text: Repository markdown line count is greater than repository Python line
    count (excluding cache/venv paths).
  severity: high
  claim_type: structural
  status: adjudicated
  verdict: confirmed
  confidence: 0.95
  owner_agent: codex
  source:
    file: docs/reviews/repo-hygiene-audit/06-ai-navigability-and-embeddings.md
    section: '1.6 Documentation Volume: Context Window Overflow Risk'
    line_ref: null
  checks:
  - check_id: RHA-012-C1
    description: Compare markdown and python line totals across repository.
    command: "source .venv/bin/activate && python - <<'PY'\nfrom pathlib import Path\n\
      exclude = {\".git\", \".venv\", \".pytest_cache\", \".mypy_cache\", \".ruff_cache\"\
      , \".uv_cache\", \"htmlcov\"}\nmd_lines = py_lines = 0\nfor p in Path(\".\"\
      ).rglob(\"*\"):\n    if not p.is_file() or any(part in exclude for part in p.parts):\n\
      \        continue\n    if p.suffix == \".md\":\n        md_lines += sum(1 for\
      \ _ in p.open(\"r\", encoding=\"utf-8\", errors=\"ignore\"))\n    elif p.suffix\
      \ == \".py\":\n        py_lines += sum(1 for _ in p.open(\"r\", encoding=\"\
      utf-8\", errors=\"ignore\"))\nprint(f\"MD_LINES={md_lines}\")\nprint(f\"PY_LINES={py_lines}\"\
      )\nif md_lines > py_lines:\n    print(\"ASSERTION=PASS\")\nelse:\n    print(\"\
      ASSERTION=FAIL\")\n    raise SystemExit(1)\nPY"
    required: true
    timeout_seconds: 180
    assertion:
      expect_exit_code: 0
      stdout_contains:
      - ASSERTION=PASS
      stdout_not_contains: []
      stderr_contains: []
      stderr_not_contains: []
      regex_match:
      - MD_LINES=[0-9]+
      - PY_LINES=[0-9]+
  notes: 'Checks 1/1. Key evidence: MD_LINES=161655; PY_LINES=140844'
