claim_template:
  claim_id: RHA-000
  title: Short claim title
  claim_text: Atomic, testable claim statement.
  severity: medium
  claim_type: structural
  status: queued
  verdict: unreviewed
  confidence: null
  owner_agent: null
  source:
    file: docs/reviews/repo-hygiene-audit/00-synthesis-summary.md
    section: Top-Level Findings
    line_ref: null
  checks:
  - check_id: RHA-000-C1
    description: Deterministic check description
    command: test -f scripts/projections/run_all_projections.py
    required: true
    timeout_seconds: 30
    assertion:
      expect_exit_code: 0
      stdout_contains: []
      stdout_not_contains: []
      stderr_contains: []
      stderr_not_contains: []
      regex_match: []
  notes: ''
claims:
- claim_id: RHA-001
  title: Ghost projection runner is referenced but missing
  claim_text: The repository references `scripts/projections/run_all_projections.py`
    in active docs, but the file does not exist.
  severity: critical
  claim_type: structural
  status: adjudicated
  verdict: confirmed
  confidence: 0.95
  owner_agent: codex
  source:
    file: docs/reviews/repo-hygiene-audit/00-synthesis-summary.md
    section: The Ugly
    line_ref: null
  checks:
  - check_id: RHA-001-C1
    description: Count documentation references and verify missing runner file.
    command: refs=$(rg -n "scripts/projections/run_all_projections.py" AGENTS.md CLAUDE.md
      README.md DEVELOPMENT_TRACKER.md docs/INDEX.md | wc -l); exists=0; [ -f scripts/projections/run_all_projections.py
      ] && exists=1; echo "DOC_REF_COUNT=$refs"; echo "FILE_EXISTS=$exists"; if [ "$refs"
      -ge 3 ] && [ "$exists" -eq 0 ]; then
      echo "ASSERTION=PASS"; else echo "ASSERTION=FAIL"; exit 1; fi
    required: true
    timeout_seconds: 30
    assertion:
      expect_exit_code: 0
      stdout_contains:
      - ASSERTION=PASS
      stdout_not_contains: []
      stderr_contains: []
      stderr_not_contains: []
      regex_match:
      - DOC_REF_COUNT=[0-9]+
      - FILE_EXISTS=0
  notes: 'Checks 1/1. Key evidence: DOC_REF_COUNT=3; FILE_EXISTS=0'
- claim_id: RHA-002
  title: Pipeline shell runner executes only three Python stages
  claim_text: '`scripts/pipeline/run_complete_pipeline.sh` calls only three pipeline
    Python scripts (01, 02, 03).'
  severity: critical
  claim_type: behavioral
  status: adjudicated
  verdict: confirmed
  confidence: 0.95
  owner_agent: codex
  source:
    file: docs/reviews/repo-hygiene-audit/02-scripts-workflow.md
    section: 2.1 Intended Pipeline Workflow
    line_ref: null
  checks:
  - check_id: RHA-002-C1
    description: Verify shell runner has exactly three python pipeline invocations
      and STEP x/3 labels.
    command: calls=$(rg -n "^python scripts/pipeline/" scripts/pipeline/run_complete_pipeline.sh
      | wc -l); labels=$(rg -n "STEP [0-9]/3" scripts/pipeline/run_complete_pipeline.sh
      | wc -l); echo "PIPELINE_CALLS=$calls"; echo "STEP_LABELS=$labels"; if [ "$calls"
      -eq 3 ] && [ "$labels" -eq 3 ]; then echo "ASSERTION=PASS"; else echo "ASSERTION=FAIL";
      exit 1; fi
    required: true
    timeout_seconds: 30
    assertion:
      expect_exit_code: 0
      stdout_contains:
      - ASSERTION=PASS
      stdout_not_contains: []
      stderr_contains: []
      stderr_not_contains: []
      regex_match:
      - PIPELINE_CALLS=3
      - STEP_LABELS=3
  notes: 'Checks 1/1. Key evidence: PIPELINE_CALLS=3; STEP_LABELS=3'
- claim_id: RHA-003
  title: Additional numbered pipeline steps are not called by runner
  claim_text: Step files `00_prepare_processed_data.py`, `01_compute_residual_migration.py`,
    `01b_compute_convergence.py`, and `01c_compute_mortality_improvement.py` exist
    but are not invoked by `run_complete_pipeline.sh`.
  severity: critical
  claim_type: behavioral
  status: adjudicated
  verdict: confirmed
  confidence: 0.95
  owner_agent: codex
  source:
    file: docs/reviews/repo-hygiene-audit/02-scripts-workflow.md
    section: 2.3 Missing Pipeline Steps
    line_ref: null
  checks:
  - check_id: RHA-003-C1
    description: Ensure four extra step files exist and are absent from runner invocations.
    command: present=0; for s in 00_prepare_processed_data.py 01_compute_residual_migration.py
      01b_compute_convergence.py 01c_compute_mortality_improvement.py; do [ -f "scripts/pipeline/$s"
      ] && present=$((present+1)); done; called=$(rg -n "00_prepare_processed_data.py|01_compute_residual_migration.py|01b_compute_convergence.py|01c_compute_mortality_improvement.py"
      scripts/pipeline/run_complete_pipeline.sh | wc -l); echo "EXTRA_STEPS_PRESENT=$present";
      echo "EXTRA_STEPS_CALLED=$called"; if [ "$present" -eq 4 ] && [ "$called" -eq
      0 ]; then echo "ASSERTION=PASS"; else echo "ASSERTION=FAIL"; exit 1; fi
    required: true
    timeout_seconds: 30
    assertion:
      expect_exit_code: 0
      stdout_contains:
      - ASSERTION=PASS
      stdout_not_contains: []
      stderr_contains: []
      stderr_not_contains: []
      regex_match:
      - EXTRA_STEPS_PRESENT=4
      - EXTRA_STEPS_CALLED=0
  notes: 'Checks 1/1. Key evidence: EXTRA_STEPS_PRESENT=4; EXTRA_STEPS_CALLED=0'
- claim_id: RHA-004
  title: Pipeline numbering collision for 01-prefixed scripts
  claim_text: 'Two different pipeline scripts share the `01_` prefix: `01_process_demographic_data.py`
    and `01_compute_residual_migration.py`.'
  severity: critical
  claim_type: structural
  status: adjudicated
  verdict: confirmed
  confidence: 0.95
  owner_agent: codex
  source:
    file: docs/reviews/repo-hygiene-audit/02-scripts-workflow.md
    section: 3.1 Numbering Collision in Pipeline
    line_ref: null
  checks:
  - check_id: RHA-004-C1
    description: Count files matching 01_*.py in pipeline directory.
    command: count=$(find scripts/pipeline -maxdepth 1 -type f -name "01_*.py" | wc
      -l); echo "PREFIX_01_COUNT=$count"; if [ "$count" -eq 2 ]; then echo "ASSERTION=PASS";
      else echo "ASSERTION=FAIL"; exit 1; fi
    required: true
    timeout_seconds: 30
    assertion:
      expect_exit_code: 0
      stdout_contains:
      - ASSERTION=PASS
      stdout_not_contains: []
      stderr_contains: []
      stderr_not_contains: []
      regex_match:
      - PREFIX_01_COUNT=2
  notes: 'Checks 1/1. Key evidence: PREFIX_01_COUNT=2'
- claim_id: RHA-005
  title: Version declarations are inconsistent across locations
  claim_text: Version declarations exist in four locations (`pyproject.toml`, `cohort_projections/version.py`,
    `cohort_projections/output/__init__.py`, `CLAUDE.md`) with at least three distinct
    values.
  severity: high
  claim_type: structural
  status: adjudicated
  verdict: confirmed
  confidence: 0.95
  owner_agent: codex
  source:
    file: docs/reviews/repo-hygiene-audit/00-synthesis-summary.md
    section: The Ugly
    line_ref: null
  checks:
  - check_id: RHA-005-C1
    description: Extract version values from four locations and confirm inconsistency.
    command: "source .venv/bin/activate && python - <<'PY'\nimport re\nfrom pathlib\
      \ import Path\n\npyproject = Path(\"pyproject.toml\").read_text(encoding=\"\
      utf-8\")\nversion_py = Path(\"cohort_projections/version.py\").read_text(encoding=\"\
      utf-8\")\noutput_init = Path(\"cohort_projections/output/__init__.py\").read_text(encoding=\"\
      utf-8\")\nclaude = Path(\"CLAUDE.md\").read_text(encoding=\"utf-8\")\n\npyv\
      \ = re.search(r'^version\\s*=\\s*\"([^\"]+)\"', pyproject, flags=re.MULTILINE).group(1)\n\
      vfile = re.search(r'__version__\\s*=\\s*\"([^\"]+)\"', version_py).group(1)\n\
      ov = re.search(r'__version__\\s*=\\s*\"([^\"]+)\"', output_init).group(1)\n\
      cv = re.search(r\"\\|\\s+\\*\\*Version\\*\\*\\s+\\|\\s+([0-9.]+)\\s+\\|\", claude).group(1)\n\
      unique = len({pyv, vfile, ov, cv})\n\nprint(f\"PYPROJECT_VERSION={pyv}\")\n\
      print(f\"VERSION_PY={vfile}\")\nprint(f\"OUTPUT_INIT_VERSION={ov}\")\nprint(f\"\
      CLAUDE_VERSION={cv}\")\nprint(f\"UNIQUE_VERSION_VALUES={unique}\")\nif unique\
      \ >= 3:\n    print(\"ASSERTION=PASS\")\nelse:\n    print(\"ASSERTION=FAIL\"\
      )\n    raise SystemExit(1)\nPY\n"
    required: true
    timeout_seconds: 30
    assertion:
      expect_exit_code: 0
      stdout_contains:
      - ASSERTION=PASS
      stdout_not_contains: []
      stderr_contains: []
      stderr_not_contains: []
      regex_match:
      - UNIQUE_VERSION_VALUES=[3-9]
  notes: 'Checks 1/1. Key evidence: PYPROJECT_VERSION=0.1.0; VERSION_PY=0.1.0'
- claim_id: RHA-006
  title: Duplicate ConfigLoader implementations coexist
  claim_text: The codebase contains two `ConfigLoader` class implementations and a
    dual-loader import shim in `cohort_projections/utils/__init__.py`.
  severity: high
  claim_type: structural
  status: adjudicated
  verdict: confirmed
  confidence: 0.95
  owner_agent: codex
  source:
    file: docs/reviews/repo-hygiene-audit/05-config-data-management.md
    section: 1.4 Config Loader Architecture
    line_ref: null
  checks:
  - check_id: RHA-006-C1
    description: Verify two ConfigLoader classes and shim imports are present.
    command: class_count=$(rg -n "^class ConfigLoader" cohort_projections/utils/config_loader.py
      libs/project_utils/project_utils/config.py | wc -l); shim_count=$(rg -n "ConfigLoader
      as _LocalConfigLoader|from project_utils import ConfigLoader as _ConfigLoader"
      cohort_projections/utils/__init__.py | wc -l); echo "CONFIGLOADER_CLASS_COUNT=$class_count";
      echo "CONFIGLOADER_SHIM_IMPORTS=$shim_count"; if [ "$class_count" -eq 2 ] &&
      [ "$shim_count" -ge 2 ]; then echo "ASSERTION=PASS"; else echo "ASSERTION=FAIL";
      exit 1; fi
    required: true
    timeout_seconds: 30
    assertion:
      expect_exit_code: 0
      stdout_contains:
      - ASSERTION=PASS
      stdout_not_contains: []
      stderr_contains: []
      stderr_not_contains: []
      regex_match:
      - CONFIGLOADER_CLASS_COUNT=2
  notes: 'Checks 1/1. Key evidence: CONFIGLOADER_CLASS_COUNT=2; CONFIGLOADER_SHIM_IMPORTS=2'
- claim_id: RHA-007
  title: Hardcoded absolute paths exist in data scripts
  claim_text: 'Three scripts contain hardcoded absolute paths: one WSL download path
    and two `Path.home()/workspace/shared-data/...` paths.'
  severity: high
  claim_type: structural
  status: adjudicated
  verdict: confirmed
  confidence: 0.95
  owner_agent: codex
  source:
    file: docs/reviews/repo-hygiene-audit/02-scripts-workflow.md
    section: 3.3 Hard-Coded Paths
    line_ref: null
  checks:
  - check_id: RHA-007-C1
    description: Search for the three hardcoded absolute-path patterns.
    command: "source .venv/bin/activate && python - <<'PY'\nfrom pathlib import Path\n\
      \nfiles = {\n    \"scripts/data/ingest_stcoreview.py\": 'Path(\"/mnt/c/Users/nhaarstad/Downloads/stcoreview_v2025_ND.xlsx\"\
      )',\n    \"scripts/data_processing/extract_pep_county_migration.py\": 'Path.home()\
      \ / \"workspace/shared-data/census/popest/parquet\"',\n    \"scripts/data_processing/extract_pep_county_migration_with_metadata.py\"\
      : 'Path.home() / \"workspace/shared-data/census/popest/parquet\"',\n}\nmatches\
      \ = 0\nfor file_path, needle in files.items():\n    text = Path(file_path).read_text(encoding=\"\
      utf-8\")\n    if needle in text:\n        matches += 1\nprint(f\"HARDCODED_PATH_MATCHES={matches}\"\
      )\nif matches == 3:\n    print(\"ASSERTION=PASS\")\nelse:\n    print(\"ASSERTION=FAIL\"\
      )\n    raise SystemExit(1)\nPY\n"
    required: true
    timeout_seconds: 30
    assertion:
      expect_exit_code: 0
      stdout_contains:
      - ASSERTION=PASS
      stdout_not_contains: []
      stderr_contains: []
      stderr_not_contains: []
      regex_match:
      - HARDCODED_PATH_MATCHES=3
  notes: 'Checks 1/1. Key evidence: HARDCODED_PATH_MATCHES=3'
- claim_id: RHA-008
  title: run_pep_projections dynamically imports pipeline module
  claim_text: '`scripts/projections/run_pep_projections.py` uses `importlib.util.spec_from_file_location`
    to load `scripts/pipeline/02_run_projections.py`.'
